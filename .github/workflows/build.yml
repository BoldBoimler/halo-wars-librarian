# Librarian build pipeline
#
# Ported from .gitlab-ci.yml. Three jobs mirror the GitLab stages:
#   build    — pip install lxml, run build.py, upload build/ as artifact
#   validate — re-parse every XML in build/ to catch malformed output
#   deploy   — scp build/ModData to the Steam Deck (manual trigger only)
#
# Differences from the GitLab version:
#   - Artifacts use actions/upload-artifact (step) instead of top-level `artifacts:` key
#   - Deploy is properly gated behind workflow_dispatch (the GitLab deploy had no
#     when:manual rule despite a comment saying it did, and would auto-fire on push)
#   - Secrets live in Settings → Secrets and variables → Actions

name: Build Librarian

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Steam Deck after build"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install lxml

      - name: Build mod
        run: python build.py --clean

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-build
          path: build/
          retention-days: 7

  validate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mod-build
          path: build/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate XML
        run: |
          python <<'EOF'
          import pathlib, sys
          import xml.etree.ElementTree as ET

          files = list(pathlib.Path("build").rglob("*.xml"))
          failed = []
          for p in files:
              try:
                  ET.parse(p)
              except ET.ParseError as e:
                  failed.append(f"{p}: {e}")

          if failed:
              print(f"Validation failed for {len(failed)} file(s):")
              for f in failed:
                  print(f"  {f}")
              sys.exit(1)

          print(f"Validated {len(files)} XML file(s)")
          EOF

  deploy:
    runs-on: ubuntu-latest
    needs: [build, validate]
    # Only run on manual dispatch with the deploy toggle set.
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mod-build
          path: build/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DECK_KEY }}" > ~/.ssh/deck_key
          chmod 600 ~/.ssh/deck_key
          # Extract host portion of user@host and add to known_hosts
          HOST=$(echo "${{ secrets.DECK_HOST }}" | cut -d'@' -f2)
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Deck
        run: |
          scp -i ~/.ssh/deck_key -r \
            build/ModData \
            "${{ secrets.DECK_HOST }}:~/HaloWarsMods/librarian-mod/"
